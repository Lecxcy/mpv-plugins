# ~/.config/mpv/input.conf

# 全屏
ENTER cycle fullscreen
KP_ENTER cycle fullscreen

# 信息面板
i script-binding stats/display-stats-toggle

# 拖动/放大画面
meta+MBTN_LEFT script-binding enhanced_drag/drag-pan-free
Ctrl+MBTN_LEFT script-binding drag_zoom_box/drag-zoom-box

# 以鼠标位置为中心缩放；同时重置拖拽产生的 video-pan-x/y，缩放和拖拽是一体的状态
0 no-osd set video-zoom 0 ; no-osd set video-pan-x 0 ; no-osd set video-pan-y 0
KP0 no-osd set video-zoom 0 ; no-osd set video-pan-x 0 ; no-osd set video-pan-y 0
WHEEL_UP script-binding cursor-centric-zoom 0.1
WHEEL_DOWN script-binding cursor-centric-zoom -0.1

# 旋转
r script-message-to enhanced_rotation rotate-video 90
R script-message-to enhanced_rotation rotate-video -90
meta+r script-message-to enhanced_rotation rotate-video-reset

# 音量
UP    script-binding enhanced_volume/volume-up
DOWN  script-binding enhanced_volume/volume-down

# 快进
RIGHT script-binding enhanced_seek/seek-forward
LEFT  script-binding enhanced_seek/seek-backward

# 速度
c multiply speed 1.1
x multiply speed 1/1.1

# 设置 A / B
[ script-binding enhanced_ab_loop/set-a
] script-binding enhanced_ab_loop/set-b
{ script-binding enhanced_ab_loop/unset-a
} script-binding enhanced_ab_loop/unset-b
\ script-binding enhanced_ab_loop/show-state
、 script-binding enhanced_ab_loop/show-state
| script-binding enhanced_ab_loop/toggle-enabled

【 script-binding enhanced_ab_loop/set-a
】 script-binding enhanced_ab_loop/set-b
「 script-binding enhanced_ab_loop/unset-a
」 script-binding enhanced_ab_loop/unset-b

# 微调
Ctrl+[ script-binding enhanced_ab_loop/nudge-a-back
Ctrl+] script-binding enhanced_ab_loop/nudge-b-back
meta+[ script-binding enhanced_ab_loop/nudge-a-forward
meta+] script-binding enhanced_ab_loop/nudge-b-forward

Ctrl+【 script-binding enhanced_ab_loop/nudge-a-back
Ctrl+】 script-binding enhanced_ab_loop/nudge-b-back
meta+【 script-binding enhanced_ab_loop/nudge-a-forward
meta+】 script-binding enhanced_ab_loop/nudge-b-forward

# 拉伸相邻区间边界（SPEC §3.2，光标要落在空隙里，不能在任何区间内部）
Alt+[ script-binding enhanced_ab_loop/extend-prev
Alt+] script-binding enhanced_ab_loop/extend-next
Alt+【 script-binding enhanced_ab_loop/extend-prev
Alt+】 script-binding enhanced_ab_loop/extend-next

# 启用/禁用光标所在区间参与循环（SPEC §5）
t script-binding enhanced_ab_loop/toggle-segment

# 存档 / 读档（SPEC §6）
Ctrl+s script-binding enhanced_ab_loop/save-loops
Ctrl+l script-binding enhanced_ab_loop/load-loops

# 读档时如果命中“内容相同但路径不同”的唯一候选，会弹出 OSD 提示，按这两个
# 键确认/取消（没有待确认项时按了没有任何效果）
y script-binding enhanced_ab_loop/confirm-yes
n script-binding enhanced_ab_loop/confirm-no

# 循环开着时，不想看完当前这段了，立刻跳到下一个启用的段
Tab script-binding enhanced_ab_loop/skip-next

# 模板：9 个编号槽位，每个槽位是一份独立的 (segments, pending) 快照。
# Shift=应用（最高频操作）；Ctrl=保存当前状态到槽位（沿用 Ctrl+s/Ctrl+l 里
# Ctrl=存档的语义）；Alt=删除槽位。三组都是单修饰键，不用双修饰键组合。
#
# 应用原本设计成 meta（Cmd）+数字，实测在真机上发现 Cmd+1/Cmd+2 会被 mpv
# 自己原生的 Cocoa 窗口菜单（"实际大小"/"双倍大小"，对应 window-scale
# 1.0/2.0）在比 input.conf 更底层的地方截走，这两个键永远到不了下面的
# script-binding；因为 mpv 是命令行方式启动、不是独立 .app，没法用系统
# "App 快捷键"单独改这两个菜单项的键位来让路，所以放弃 meta，改用 Shift。
#
# "Shift+数字"这个写法本身也不对：跟本文件里已经踩过的 [ / ] -> { / } 是
# 同一个坑——mpv 的 input.conf 对可打印字符（字母/数字/符号）不认
# "Shift+基准键"这种组合写法，而是直接认 Shift 按下后实际产生的那个字符
# 本身（mpv/input/input.c 里没有把 Shift 修饰符和可打印字符分开处理，
# 拿到的就是产生的字符）。US 键盘布局下 Shift+1..9 产生的字符是
# !@#$%^&*(，所以下面直接写这些字符本身，不写 "Shift+1" 这种组合。
# 唯一的例外是数字 3 对应的 "#"——mpv 的 input.conf 解析器把任何以 "#"
# 开头的行整行当注释跳过（input/input.c:1629 `bstr_startswith0(line, "#")`），
# 直接写字面的 "#" 这一整条绑定会被当成注释，完全不会生效；mpv 的按键表
# 里给 "#" 专门起了个别名 "SHARP"（input/keycodes.c:38 `{ '#', "SHARP" }`），
# 用这个别名代替字面字符就能绕开注释解析。
# 如果你的物理键盘不是 US 布局，Shift+1..9 实际产生的符号可能不一样，
# 按不动的话把下面对应那一行换成你键盘实际产生的字符即可。
! script-binding enhanced_ab_loop/template-apply-1
@ script-binding enhanced_ab_loop/template-apply-2
SHARP script-binding enhanced_ab_loop/template-apply-3
$ script-binding enhanced_ab_loop/template-apply-4
% script-binding enhanced_ab_loop/template-apply-5
^ script-binding enhanced_ab_loop/template-apply-6
& script-binding enhanced_ab_loop/template-apply-7
* script-binding enhanced_ab_loop/template-apply-8
( script-binding enhanced_ab_loop/template-apply-9

Ctrl+1 script-binding enhanced_ab_loop/template-save-1
Ctrl+2 script-binding enhanced_ab_loop/template-save-2
Ctrl+3 script-binding enhanced_ab_loop/template-save-3
Ctrl+4 script-binding enhanced_ab_loop/template-save-4
Ctrl+5 script-binding enhanced_ab_loop/template-save-5
Ctrl+6 script-binding enhanced_ab_loop/template-save-6
Ctrl+7 script-binding enhanced_ab_loop/template-save-7
Ctrl+8 script-binding enhanced_ab_loop/template-save-8
Ctrl+9 script-binding enhanced_ab_loop/template-save-9

Alt+1 script-binding enhanced_ab_loop/template-delete-1
Alt+2 script-binding enhanced_ab_loop/template-delete-2
Alt+3 script-binding enhanced_ab_loop/template-delete-3
Alt+4 script-binding enhanced_ab_loop/template-delete-4
Alt+5 script-binding enhanced_ab_loop/template-delete-5
Alt+6 script-binding enhanced_ab_loop/template-delete-6
Alt+7 script-binding enhanced_ab_loop/template-delete-7
Alt+8 script-binding enhanced_ab_loop/template-delete-8
Alt+9 script-binding enhanced_ab_loop/template-delete-9
